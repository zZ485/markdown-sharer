services:
  backend:
    build: ./backend
    container_name: md-sharer-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: md-sharer-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
